<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經銅錢卦占卜</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* 中式水墨主題（依據參考圖） */
            --bg-color: #e6dfcd;
            /* 宣紙底色 */
            --text-color: #2c3032;
            /* 墨黑 */
            --highlight-color: #c96a25;
            /* 朱砂/橘銅色 */
            --panel-bg: rgba(235, 229, 215, 0.85);
            /* 淺墨背景(增加不透明度以利閱讀) */
            --border-color: rgba(44, 48, 50, 0.2);
            /* 淡墨框線 */
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            /* 加上一層半透明的宣紙色遮罩，讓水墨背景淡化退居幕後 */
            background-image: linear-gradient(rgba(230, 223, 205, 0.65), rgba(230, 223, 205, 0.65)), url('./bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 標題與重要文字使用粗體書法/碑帖字體 */
        h1,
        h3,
        .toss-status,
        #hex-title {
            font-family: 'Weibei TC', 'Weibei SC', 'LiSu', 'Xingkai TC', 'STXingkai', 'Kaiti TC', 'BiauKai', 'DFKai-SB', 'Noto Serif TC', serif;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--text-color);
            font-weight: 400;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: 'Noto Serif TC', serif;
            font-size: 1rem;
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: 1px solid var(--highlight-color);
        }

        .btn {
            background-color: transparent;
            color: var(--highlight-color);
            border: 2px solid var(--highlight-color);
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Weibei TC', 'Weibei SC', 'LiSu', 'Xingkai TC', 'STXingkai', 'Kaiti TC', 'BiauKai', 'DFKai-SB', 'Noto Serif TC', serif;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: var(--highlight-color);
            color: var(--bg-color);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        
        /* Rules Box */
        .rules-box {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
        }
        .rules-box h4 {
            margin: 0 0 10px 0;
            color: var(--highlight-color);
            text-align: center;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-color);
        }
        .rules-box li {
            margin-bottom: 8px;
        }
        .rules-box strong {
            color: #8b4513;
        }

        /* Meditation Screen */
        #meditation-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(20, 20, 18, 0.95);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
        #meditation-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        .meditation-text {
            color: #e6dfcd;
            font-size: 1.8rem;
            letter-spacing: 4px;
            font-family: 'Weibei TC', serif;
            text-align: center;
            line-height: 2;
        }
        .meditation-countdown {
            font-size: 3rem;
            color: var(--highlight-color);
            margin-top: 20px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Update Coin CSS */
        .coin-front {
            background: radial-gradient(circle, #e2b781 30%, #c49a6c 100%);
            border: 8px solid #5c4322;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin-front::after { display: none; } /* hide square hole */
        .coin-front::before { display: none; } /* hide old text */
        
        .clover {
            width: 48px;
            height: 48px;
            position: relative;
        }
        .clover-leaf {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #5c4322;
        }
        .clover-leaf:nth-child(1) { top: 0; left: 0; border-radius: 50% 50% 0 50%; }
        .clover-leaf:nth-child(2) { top: 0; left: 24px; border-radius: 50% 50% 50% 0; }
        .clover-leaf:nth-child(3) { top: 24px; left: 24px; border-radius: 0 50% 50% 50%; }
        .clover-leaf:nth-child(4) { top: 24px; left: 0; border-radius: 50% 0 50% 50%; }

        .coin-back::before { display: none; } /* hide old text */
        .coin-text {
            position: absolute;
            color: #4a361c;
            font-family: 'Weibei TC', serif;
            font-size: 1.2rem;
            font-weight: bold;
            transform: rotate(180deg); /* because coin-back is rotated 180deg */
        }
        .coin-text.top { bottom: 10px; } /* flipped */
        .coin-text.bottom { top: 10px; }
        .coin-text.left { right: 10px; }
        .coin-text.right { left: 10px; }

        /* Toss Area */
        #toss-area,
        #result-area {
            display: none;
        }

        .toss-status {
            text-align: center;
            font-size: 1.2rem;
            color: var(--highlight-color);
            margin: 20px 0;
            height: 30px;
        }

        /* 獨立動畫頁面疊加層 */
        #ritual-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(20, 20, 18, 0.4), rgba(20, 20, 18, 0.4)), url('./bg_toss.png');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        #ritual-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .ritual-coins {
            display: flex;
            gap: 40px;
            perspective: 1200px;
        }

        .ritual-coin-wrapper {
            width: 120px;
            height: 120px;
            transform: translateY(15vh);
        }

        .ritual-coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #5c4322;
            background: radial-gradient(circle, #c4a777 40%, #9e7f4b 100%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 0 10px 20px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .coin-face::after {
            content: '';
            width: 32px;
            height: 32px;
            background-color: #1a1a1a;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.8);
        }

        .coin-front {
            transform: rotateX(0deg);
        }

        .coin-front::before {
            content: '〰 〰';
            position: absolute;
            color: #4a361c;
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 38px;
            opacity: 0.8;
        }

        .coin-back {
            transform: rotateX(180deg);
        }

        .coin-back::before {
            content: '乾 隆';
            position: absolute;
            color: #4a361c;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 38px;
            font-family: 'Weibei TC', serif;
            opacity: 0.8;
            transform: rotate(180deg);
        }

        @keyframes throwUp {
            0% {
                transform: translateY(15vh) scale(1);
                animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            40% {
                transform: translateY(-35vh) scale(1.6);
                animation-timing-function: cubic-bezier(0.8, 0, 0.8, 0.2);
            }

            70% {
                transform: translateY(15vh) scale(1);
                animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            85% {
                transform: translateY(0vh) scale(1.1);
                animation-timing-function: cubic-bezier(0.8, 0, 0.8, 0.2);
            }

            100% {
                transform: translateY(15vh) scale(1);
            }
        }

        .tossing-anim {
            animation: throwUp 1.5s forwards;
        }

        /* Hexagram Display */
        .hexagram-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            margin: 30px 0;
            align-items: center;
        }

        .line-item {
            font-size: 2rem;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            width: 100%;
            max-width: 350px;
        }

        .line-label {
            font-size: 1rem;
            color: #888;
            width: 120px;
            text-align: right;
            margin-right: 20px;
        }

        .line-symbol {
            font-family: monospace;
            letter-spacing: -2px;
        }

        .change-mark {
            font-size: 1rem;
            color: var(--highlight-color);
            border: 1px solid var(--highlight-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }

        .no-change-mark {
            width: 24px;
            height: 24px;
            margin-left: 15px;
        }

        .fade-in {
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .changing-line {
            color: var(--highlight-color);
            text-shadow: 0 0 8px rgba(201, 106, 37, 0.4);
        }

        /* Results Panel */
        .result-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: none;
            line-height: 1.6;
        }

        .unfold-animation {
            display: block;
            transform-origin: top center;
            animation: unfoldBook 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes unfoldBook {
            0% {
                opacity: 0;
                transform: scaleY(0);
            }

            100% {
                opacity: 1;
                transform: scaleY(1);
            }
        }

        .result-panel h3 {
            margin-top: 0;
            color: var(--highlight-color);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        .prompt-box {
            position: relative;
            background-color: rgba(235, 229, 215, 0.7);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }

        .prompt-content {
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
            color: var(--text-color);
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .subtext {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
    
        .hexagrams-wrapper {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .hexagram-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hex-label {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--highlight-color);
            opacity: 0;
            transition: opacity 1s;
        }

        .zhi-gua-changed-line .line-symbol {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        #taiji-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(20, 20, 18, 0.98);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #taiji-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .taiji-spin {
            width: 150px; height: 150px;
            border-radius: 50%;
            background: linear-gradient(90deg, #fff 50%, #000 50%);
            position: relative;
        }
        .taiji-spin.animating {
            animation: spinTaiji 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .taiji-spin::before {
            content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 15px #000 inset;
        }
        .taiji-spin::after {
            content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; border-radius: 50%; background: #000; box-shadow: 0 0 0 15px #fff inset;
        }
        @keyframes spinTaiji { 0% { transform: rotate(0deg); } 100% { transform: rotate(720deg); } }

        .taiji-text {
            color: var(--highlight-color);
            font-size: 1.5rem;
            margin-top: 40px;
            text-align: center;
            letter-spacing: 3px;
            opacity: 0;
            line-height: 1.8;
            font-family: 'Weibei TC', serif;
        }
        .taiji-text.animating {
            animation: fadeInOut 3s linear forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .taiji-light {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 100px 50px #fff, 0 0 200px 100px var(--highlight-color);
            opacity: 0;
            pointer-events: none;
        }
        .taiji-light.flash {
            animation: lightFlash 1.5s ease-out forwards;
        }
        @keyframes lightFlash {
            0% { opacity: 0; transform: scale(1); }
            30% { opacity: 1; transform: scale(30); background: #fff; }
            100% { opacity: 0; transform: scale(50); background: #fff; }
        }

        .guide-text {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--highlight-color);
            border-radius: 4px;
            line-height: 1.6;
        }
        .guide-text strong {
            color: var(--highlight-color);
        }
</style>
</head>

<body>
    <div class="container">
        <header style="justify-content: center;">
            <h1>易經銅錢卦</h1>
        </header>

        <div id="setup-area" class="input-area">
            <textarea id="question" placeholder="請在此輸入您想占卜的問題..."></textarea>
            
            <button class="btn" onclick="startMeditation()">開始起卦</button>
            <div class="rules-box">
                <h4>問卦三守則</h4>
                <ul>
                    <li><strong>一事一問：</strong>一個問題只問一件事，保持心念具體明確。</li>
                    <li><strong>不誠不占：</strong>心誠則靈，相同問題短期內請勿反覆起卦。</li>
                    <li><strong>莫問非分：</strong>以自身相關之事為主，不卜違背常理之事。</li>
                </ul>
            </div>

        </div>

        
        <div id="toss-area">
            <div id="toss-status" class="toss-status"></div>
            
            
            <div style="text-align: center; margin-top: 20px;" id="toss-action-area">
                <button class="btn" id="toss-btn" onclick="tossNextLine()">擲筊 (第 1 爻)</button>
            </div>
            
            <div class="hexagrams-wrapper" id="hexagrams-wrapper">

                <div class="hexagram-col" id="orig-hex-col">
                    <div id="hexagram-lines" class="hexagram-container"></div>
                    <div class="hex-label" id="orig-hex-label">本卦</div>
                </div>
                <div class="hexagram-col" id="zhi-gua-col" style="display: none;">
                    <div id="changed-hexagram-lines" class="hexagram-container"></div>
                    <div class="hex-label" id="changed-hex-label">之卦</div>
                </div>
            </div>
        </div>

        <div id="result-area">
            <div id="hexagram-info" class="result-panel">
                <h3 id="hex-title"></h3>
                <p id="hex-desc"></p>
                <div id="hex-changing"></div>
            </div>

            <div id="prompt-section" class="result-panel">
                <h3 style="display: flex; justify-content: space-between; align-items: center;">
                    📋 複製提示詞，貼到你的 AI 解讀
                    <button class="copy-btn" onclick="copyPrompt()">一鍵複製</button>
                </h3>
                <div class="prompt-box" onclick="copyPrompt()" style="cursor: pointer;" title="點擊即可複製">
                    <div id="prompt-content" class="prompt-content"></div>
                </div>
                <p class="subtext">將上方提示詞貼到 Claude / ChatGPT / Gemini 即可獲得專業解讀（點擊區塊亦可複製）</p>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" onclick="reset()">重新起卦</button>
            </div>
        </div>
    </div>

    
    <div id="meditation-screen">
        <div class="meditation-text">
            請閉上雙眼，靜心默念您的問題<br>
            <div class="meditation-countdown" id="meditation-countdown">5</div>
        </div>
    </div>

    <div id="ritual-overlay">
        <div id="coin-legend" style="position: absolute; top: 15%; width: 100%; text-align: center; color: #e6dfcd; font-size: 1.2rem; font-family: 'Weibei TC', serif; letter-spacing: 2px;">
            四葉幸運草 = 陽 (3) &nbsp;&nbsp;|&nbsp;&nbsp; 乾隆通寶 = 陰 (2)
        </div>
        <div class="ritual-coins">
            <div class="ritual-coin-wrapper" id="rcw-1">
                <div class="ritual-coin" id="rc-1">
                    <div class="coin-face coin-front">
                        <div class="clover">
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                        </div>
                    </div>
                    <div class="coin-face coin-back">
                        <span class="coin-text top">乾</span>
                        <span class="coin-text bottom">隆</span>
                        <span class="coin-text right">通</span>
                        <span class="coin-text left">寶</span>
                    </div>
                </div>
            </div>
            <div class="ritual-coin-wrapper" id="rcw-2">
                <div class="ritual-coin" id="rc-2">
                    <div class="coin-face coin-front">
                        <div class="clover">
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                        </div>
                    </div>
                    <div class="coin-face coin-back">
                        <span class="coin-text top">乾</span>
                        <span class="coin-text bottom">隆</span>
                        <span class="coin-text right">通</span>
                        <span class="coin-text left">寶</span>
                    </div>
                </div>
            </div>
            <div class="ritual-coin-wrapper" id="rcw-3">
                <div class="ritual-coin" id="rc-3">
                    <div class="coin-face coin-front">
                        <div class="clover">
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                            <div class="clover-leaf"></div>
                        </div>
                    </div>
                    <div class="coin-face coin-back">
                        <span class="coin-text top">乾</span>
                        <span class="coin-text bottom">隆</span>
                        <span class="coin-text right">通</span>
                        <span class="coin-text left">寶</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="taiji-overlay">
        <div class="taiji-spin" id="taiji-spin"></div>
        <div class="taiji-text" id="taiji-text">萬物皆變，化生之卦</div>
        <div class="taiji-light" id="taiji-light"></div>
    </div>

    <script src="iching_data.js"></script>
    <!-- 易經邏輯腳本 -->
    <script>


        // 輔助獲取完整卦資料
        function getHexagramData(binaryStr) {
            return hexagrams[binaryStr] || {
                name: "未知",
                up: "未知",
                down: "未知",
                desc: "無資料",
                lines: Array(6).fill("無資料")
            };
        }

        function getLineName(index, isYang) {
            const num = isYang ? '九' : '六';
            const pos = ['初', '二', '三', '四', '五', '上'][index];
            if (index === 0) return '初' + num;
            if (index === 5) return '上' + num;
            return num + pos;
        }

        // Web Audio API
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBowl() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 2);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        function playDing(pitchMultiplier = 1) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 * pitchMultiplier, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function playCoinDrop() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200 + Math.random() * 400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 占卜邏輯
        
        let tosses = [];
        let currentLineCount = 0;
        let questionText = "";

        function startMeditation() {
            questionText = document.getElementById('question').value.trim();
            if (!questionText) {
                alert("請先輸入您的問題。");
                return;
            }

            document.getElementById('setup-area').style.display = 'none';
            const medScreen = document.getElementById('meditation-screen');
            const countdownEl = document.getElementById('meditation-countdown');
            medScreen.classList.add('active');
            
            playBowl(); // 播放頌缽聲引導靜心

            let timeLeft = 5;
            countdownEl.textContent = timeLeft;
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    medScreen.classList.remove('active');
                    setTimeout(() => {
                        initTossArea();
                    }, 1000);
                }
            }, 1000);
        }

        function initTossArea() {
            document.getElementById('toss-area').style.display = 'block';
            document.getElementById('toss-status').textContent = "請點擊按鈕，擲出第一爻";
            document.getElementById('hexagram-lines').innerHTML = '';
            document.getElementById('zhi-gua-col').style.display = 'none';
            document.getElementById('changed-hexagram-lines').innerHTML = '';
            document.getElementById('orig-hex-label').style.opacity = '0';
            document.getElementById('changed-hex-label').style.opacity = '0';
            document.getElementById('result-area').style.display = 'none';
            
            document.getElementById('toss-btn').style.display = 'inline-block';
            document.getElementById('toss-btn').textContent = "擲筊 (第 1 爻)";
            document.getElementById('toss-btn').disabled = false;
            
            tosses = [];
            currentLineCount = 0;
        }

        function tossNextLine() {
            const btn = document.getElementById('toss-btn');
            btn.disabled = true;
            
            const c1 = Math.random() < 0.5 ? 2 : 3;
            const c2 = Math.random() < 0.5 ? 2 : 3;
            const c3 = Math.random() < 0.5 ? 2 : 3;
            const sum = c1 + c2 + c3;
            
            const faces = [c1, c2, c3].sort(() => Math.random() - 0.5);
            
            const overlay = document.getElementById('ritual-overlay');
            overlay.classList.add('active');

            // Reset coin rotation
            for (let c = 1; c <= 3; c++) {
                const el = document.getElementById(`rc-${c}`);
                el.style.transition = 'none';
                el.style.transform = `rotateX(0deg) rotateY(0deg) rotateZ(0deg)`;
            }

            void document.getElementById('rc-1').offsetWidth; // Force repaint

            // Toss animation
            for (let c = 1; c <= 3; c++) {
                const wrapper = document.getElementById(`rcw-${c}`);
                const el = document.getElementById(`rc-${c}`);
                wrapper.classList.remove('tossing-anim');
                void wrapper.offsetWidth;

                const delay = (c - 1) * 60;
                setTimeout(() => {
                    wrapper.classList.add('tossing-anim');
                    const isYang = faces[c - 1] === 3;
                    // Front is Yang (Taiji), Back is Yin (Square hole)
                    // If isYang, we want Front (0deg). But initial coin-front is rotateX(0deg).
                    // We spin it multiple times. If isYang, end at even multiples of 180 (0, 360). 
                    // If Yin, end at odd multiples (180, 540).
                    const spinX = 360 * (4 + Math.floor(Math.random() * 2)) + (isYang ? 0 : 180);
                    const rY = (Math.random() - 0.5) * 60;
                    const rZ = (Math.random() - 0.5) * 60;

                    el.style.transition = 'transform 1.5s cubic-bezier(0.1, 0.85, 0.15, 1)';
                    el.style.transform = `rotateX(${spinX}deg) rotateY(${rY}deg) rotateZ(${rZ}deg)`;
                }, delay);
            }

            setTimeout(() => playCoinDrop(), 1050);
            setTimeout(() => playCoinDrop(), 1110);
            setTimeout(() => playCoinDrop(), 1170);
            setTimeout(() => playCoinDrop(), 1500);

            setTimeout(() => {
                overlay.classList.remove('active');
                setTimeout(() => {
                    tosses.push(sum);
                    displaySingleLine(currentLineCount);
                    currentLineCount++;
                    
                    if (currentLineCount < 6) {
                        btn.textContent = `擲筊 (第 ${currentLineCount + 1} 爻)`;
                        btn.disabled = false;
                        document.getElementById('toss-status').textContent = `請繼續擲第 ${currentLineCount + 1} 爻`;
                    } else {
                        btn.style.display = 'none';
                        setTimeout(() => showResult(questionText), 800);
                    }
                }, 400);
            }, 2100);
        }

        function getLineInfo(sum) {
            if (sum === 6) return { symbol: '×', type: 'yin', change: true, name: '老陰' };
            if (sum === 7) return { symbol: '—', type: 'yang', change: false, name: '少陽' };
            if (sum === 8) return { symbol: '--', type: 'yin', change: false, name: '少陰' };
            if (sum === 9) return { symbol: '○', type: 'yang', change: true, name: '老陽' };
        }

        function displaySingleLine(index) {
            const lineNum = index + 1;
            document.getElementById('toss-status').textContent = `第${lineNum}爻，天機顯現`;
            const info = getLineInfo(tosses[index]);
            playDing(1 + index * 0.1);

            const lineDiv = document.createElement('div');
            lineDiv.className = 'line-item fade-in';
            if (info.change) lineDiv.classList.add('changing-line');

            let drawSymbol = info.symbol === '—' || info.symbol === '○' ? '━━━━━' : '━━ ━━';
            const labelStr = `<div class="line-label">第${lineNum}爻 · ${info.name}</div>`;
            const changeMark = info.change ? `<div class="change-mark">動</div>` : `<div class="no-change-mark"></div>`;

            lineDiv.innerHTML = `${labelStr}<div class="line-symbol">${drawSymbol}</div>${changeMark}`;
            document.getElementById('hexagram-lines').append(lineDiv);
        }

        function showResult(question) {
            document.getElementById('toss-status').textContent = "卦象已成，請細細觀之";

            let origBinary = '';
            let changedBinary = '';
            let changingIndices = [];

            for (let i = 0; i < 6; i++) {
                const s = tosses[i];
                if (s === 7 || s === 9) origBinary += '1'; else origBinary += '0';
                if (s === 7 || s === 6) changedBinary += '1'; else changedBinary += '0';
                if (s === 6 || s === 9) changingIndices.push(i);
            }

            const origData = getHexagramData(origBinary);
            const changedData = getHexagramData(changedBinary);
            
            document.getElementById('orig-hex-label').style.opacity = '1';

            if (changingIndices.length >= 3) {
                // 觸發太極轉化動畫
                playZhiGuaAnimation(question, origData, changedData, changingIndices);
            } else {
                // 直接顯示結果
                renderResult(question, origData, changedData, changingIndices, false);
            }
        }

        function playZhiGuaAnimation(question, origData, changedData, changingIndices) {
            const overlay = document.getElementById('taiji-overlay');
            const spin = document.getElementById('taiji-spin');
            const text = document.getElementById('taiji-text');
            const light = document.getElementById('taiji-light');

            overlay.classList.add('active');
            spin.classList.add('animating');
            text.classList.add('animating');

            playBowl(); // 播放神秘音效

            setTimeout(() => {
                // 太極裂開亮光
                light.classList.add('flash');
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                    renderZhiGua(changedData, changingIndices);
                    renderResult(question, origData, changedData, changingIndices, true);
                }, 700);
                
            }, 3000);
        }

        function renderZhiGua(changedData, changingIndices) {
            document.getElementById('zhi-gua-col').style.display = 'flex';
            document.getElementById('changed-hex-label').style.opacity = '1';
            const container = document.getElementById('changed-hexagram-lines');
            container.innerHTML = '';
            
            // 從下往上繪製
            for (let i = 0; i < 6; i++) {
                const s = tosses[i];
                // 判斷之卦爻符號
                let isYang = (s === 7 || s === 6);
                let drawSymbol = isYang ? '━━━━━' : '━━ ━━';
                let isChanged = changingIndices.includes(i);
                
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line-item fade-in';
                if (isChanged) lineDiv.classList.add('zhi-gua-changed-line');
                
                lineDiv.style.opacity = 1;
                lineDiv.style.transform = 'translateY(0)';
                
                const labelStr = `<div class="line-label">第${i+1}爻</div>`;
                const changeMark = isChanged ? `<div class="change-mark">變</div>` : `<div class="no-change-mark"></div>`;

                lineDiv.innerHTML = `${labelStr}<div class="line-symbol">${drawSymbol}</div>${changeMark}`;
                container.append(lineDiv);
            }
        }

        function renderResult(question, origData, changedData, changingIndices, hasZhiGua) {
            document.getElementById('result-area').style.display = 'block';

            const infoPanel = document.getElementById('hexagram-info');
            const promptSection = document.getElementById('prompt-section');

            infoPanel.classList.add('unfold-animation');
            promptSection.classList.add('unfold-animation');
            promptSection.style.animationDelay = "0.4s";

            // 生成介面上的解讀總結
            let summaryHtml = `<strong>本卦：</strong>第 ${origData["第幾卦"]} 卦 ${origData.name}（${origData.up}上${origData.down}下）<br>`;
            summaryHtml += `<strong>變爻：</strong>${changingIndices.length} 個<br>`;
            if (changingIndices.length > 0) {
                // 將變卦改為之卦
                summaryHtml += `<strong>之卦：</strong>第 ${changedData["第幾卦"]} 卦 ${changedData.name}（${changedData.up}上${changedData.down}下）<br>`;
            }

            let guide = ichingPrompts.getUIGuide(changingIndices, origData, changedData);

            summaryHtml += `<br><div class="guide-text">${guide}</div>`;

            document.getElementById('hex-title').innerHTML = `📌 卦象總結`;
            document.getElementById('hex-desc').innerHTML = summaryHtml;

            // 生成提示詞
            const prompt = generatePromptText(question, origData, changedData, changingIndices);
            document.getElementById('prompt-content').textContent = prompt;
        }

        function generatePromptText(question, origData, changedData, changingIndices) {
            const changingCount = changingIndices.length;

            let allLinesDetail = '';
            const linePosNames = ['初', '二', '三', '四', '五', '上'];

            // 提示詞中的爻象從上到下排列，方便閱讀 (6 -> 1)
            for (let i = 5; i >= 0; i--) {
                const info = getLineInfo(tosses[i]);
                const isChange = info.change ? '【變爻】' : '';
                allLinesDetail += `- ${linePosNames[i]}爻：${info.name}${info.symbol}　${isChange}\n`;
            }

            let changeText = '';
            let changeValueText = '';
            if (changingCount === 0) {
                changeValueText = `0個`;
                changeText = `變爻位置：無\n變爻爻辭：無`;
            } else {
                changeValueText = `${changingCount}個`;
                const indicesText = changingIndices.map(i => i + 1).join(', ');
                const namesText = changingIndices.map(i => getLineName(i, tosses[i] === 9)).join(', ');
                let linesText = changingIndices.map(i => origData.lines[i]).join('\n');

                changeText = `變爻位置：第${indicesText}爻（${namesText}）\n變爻爻辭：\n${linesText}`;
            }

            return ichingPrompts.getPromptTemplate(question, origData, changedData, changingIndices, allLinesDetail, changeValueText, changeText);
        }

        function copyPrompt() {
            const contentElement = document.getElementById('prompt-content');
            const content = contentElement.textContent;

            // 選取文字讓使用者有視覺回饋
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(contentElement);
            selection.removeAllRanges();
            selection.addRange(range);

            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ 已複製';
                btn.style.backgroundColor = '#4CAF50';
                btn.style.color = '#fff';

                setTimeout(() => {
                    btn.textContent = '一鍵複製';
                    btn.style.backgroundColor = 'var(--highlight-color)';
                    btn.style.color = '#141210';
                    selection.removeAllRanges();
                }, 2000);
            }).catch(err => {
                alert('複製失敗，請手動選取複製');
            });
        }

        function reset() {
            document.getElementById('setup-area').style.display = 'flex';
            document.getElementById('toss-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('hexagram-lines').innerHTML = '';
            document.getElementById('question').value = '';

            const infoPanel = document.getElementById('hexagram-info');
            const promptSection = document.getElementById('prompt-section');
            infoPanel.classList.remove('unfold-animation');
            promptSection.classList.remove('unfold-animation');
            promptSection.style.animationDelay = "0s";

            tosses = [];
        }

    </script>
</body>

</html>
